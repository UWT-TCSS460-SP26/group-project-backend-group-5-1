openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0
servers:
  - url: https://tcss460-group-5-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: General
    description: General-purpose routes
  - name: System
    description: Health and status routes
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time
  /tv/search:
    get:
      tags:
        - TV
      summary: Search for TV shows
      description: Returns a list of TV shows matching the search query.
      parameters:
        - name: query
          in: query
          description: Text search query (e.g. "spiderman"). When provided, all filter parameters are ignored.
          required: false
          schema:
            type: string
          example: spiderman
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: primary_release_date_gte
          in: query
          description: Filter movies released on or after this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2020-01-01'
        - name: primary_release_date_lte
          in: query
          description: Filter movies released on or before this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2024-12-31'
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies when `query` is not provided.
          required: false
          schema:
            type: string
          example: '28,878'
        - name: vote_average_gte
          in: query
          description: Filter by minimum vote average. Only applies when `query` is not provided.
          required: false
          schema:
            type: number
            format: float
          example: 7.0
        - name: vote_average_lte
          in: query
          description: Filter by maximum vote average. Only applies when `query` is not provided.
          required: false
          schema:
            type: number
            format: float
          example: 9.0
        - name: with_runtime_gte
          in: query
          description: Filter by minimum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 90
        - name: with_runtime_lte
          in: query
          description: Filter by maximum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 180
      responses:
        '200':
          description: A list of movies matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 100
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns a list of currently popular movies from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        '200':
          description: A list of popular movies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get a movie by ID
      description: Returns detailed information for a specific movie by its TMDB movie ID.
      parameters:
        - name: id
          in: path
          description: The TMDB movie ID.
          required: true
          schema:
            type: string
          description: Search term for TV shows.
        - in: query
          name: year
          required: false
          schema:
            type: string
          description: Filter results by first air date year.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for paginated results.
      responses:
        '200':
          description: Successful TV search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSearchResult'
              examples:
                example:
                  value:
                    page: 1
                    totalPages: 25
                    totalResults: 496
                    results:
                      - id: 4607
                        title: 'Lost'
                        posterUrl: 'https://image.tmdb.org/t/p/w500/og65OaTZU6YUJAbqxeKjCa3kY1E.jpg'
                        firstAirDate: '2004-09-22'

  /tv/popular:
    get:
      tags:
        - TV
      summary: Get popular TV shows
      description: Returns a list of currently popular TV shows.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for paginated results.
      responses:
        '200':
          description: Popular TV shows
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSearchResult'

  /tv/{id}:
    get:
      tags:
        - TV
      summary: Get TV show details
      description: Returns detailed information for a specific TV show.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: TMDB TV show ID.
      responses:
        '200':
          description: TV show details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvDetails'
components:
  schemas:
    TvSearchResult:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        posterUrl:
          type: string
          nullable: true
        firstAirDate:
          type: string
          nullable: true

    TvDetails:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        posterUrl:
          type: string
          nullable: true
        synopsis:
          type: string
          nullable: true
        firstAirDate:
          type: string
          nullable: true
        genres:
          type: array
          items:
            type: string
        status:
          type: string
          nullable: true
        numberOfSeasons:
          type: integer
          nullable: true
        numberOfEpisodes:
          type: integer
          nullable: true
        networks:
          type: array
          items:
            type: string
