openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0
servers:
  - url: https://tcss460-group-5-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: General
    description: General-purpose routes
  - name: System
    description: Health and status routes
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time
  /v1/movies:
    get:
      tags: [Movies]
      summary: Search or discover movies
      description: >
        Returns a list of movies. If a `query` parameter is provided, performs a
        text search via TMDB's search endpoint. Otherwise, uses TMDB's discover
        endpoint with the provided filter parameters.
      parameters:
        - name: query
          in: query
          description: Text search query (e.g. "spiderman"). When provided, all filter parameters are ignored.
          required: false
          schema:
            type: string
          example: spiderman
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: primary_release_date_gte
          in: query
          description: Filter movies released on or after this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2020-01-01'
        - name: primary_release_date_lte
          in: query
          description: Filter movies released on or before this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2024-12-31'
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies when `query` is not provided.
          required: false
          schema:
            type: string
          example: '28,878'
        - name: vote_average_gte
          in: query
          description: Filter by minimum vote average. Only applies when `query` is not provided.
          required: false
          schema:
            type: number
            format: float
          example: 7.0
        - name: vote_average_lte
          in: query
          description: Filter by maximum vote average. Only applies when `query` is not provided.
          required: false
          schema:
            type: number
            format: float
          example: 9.0
        - name: with_runtime_gte
          in: query
          description: Filter by minimum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 90
        - name: with_runtime_lte
          in: query
          description: Filter by maximum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 180
      responses:
        '200':
          description: A list of movies matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 100
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns a list of currently popular movies from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 100.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        '200':
          description: A list of popular movies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get a movie by ID
      description: Returns detailed information for a specific movie by its TMDB movie ID.
      parameters:
        - name: id
          in: path
          description: The TMDB movie ID.
          required: true
          schema:
            type: integer
            minimum: 1
          example: 557
      responses:
        '200':
          description: Detailed information about the requested movie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetail'
              example:
                adult: false
                genre_ids: [28, 878]
                original_language: en
                original_title: Spider-Man
                overview: >
                  After being bitten by a genetically altered spider at Oscorp, nerdy but
                  endearing high school student Peter Parker is endowed with amazing powers
                  to become the superhero known as Spider-Man.
                release_date: '2002-05-01'
                title: Spider-Man
        '400':
          description: Invalid movie ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Movie id must be a positive integer
        '404':
          description: Movie not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Movie with id 99999 not found
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    MovieSummary:
      type: object
      description: A condensed movie object returned from list endpoints.
      properties:
        id:
          type: integer
          description: The TMDB movie ID.
          example: 557
        title:
          type: string
          description: The movie title.
          example: Spider-Man
        backdrop_path:
          type: string
          nullable: true
          description: Relative path to the backdrop image on TMDB's image CDN.
          example: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
        poster_path:
          type: string
          nullable: true
          description: Relative path to the poster image on TMDB's image CDN.
          example: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg

    MovieDetail:
      type: object
      description: Detailed movie information returned from the single movie endpoint.
      properties:
        adult:
          type: boolean
          description: Whether the movie is an adult title.
          example: false
        genre_ids:
          type: array
          description: List of TMDB genre IDs associated with the movie.
          items:
            type: integer
          example: [28, 878]
        original_language:
          type: string
          description: The original language of the movie in ISO 639-1 format.
          example: en
        original_title:
          type: string
          description: The movie title in its original language.
          example: Spider-Man
        overview:
          type: string
          description: A short plot summary of the movie.
          example: After being bitten by a genetically altered spider...
        release_date:
          type: string
          format: date
          description: The theatrical release date of the movie (YYYY-MM-DD).
          example: '2002-05-01'
        title:
          type: string
          description: The movie title in the requested language.
          example: Spider-Man

    Error:
      type: object
      properties:
        error:
          type: string
          description: A human-readable error message.
          example: Movie with id 99999 not found
