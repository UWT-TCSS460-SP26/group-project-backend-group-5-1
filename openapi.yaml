openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0
servers:
  - url: https://tcss460-group-5-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: General
    description: General-purpose routes
  - name: System
    description: Health and status routes
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time
  /tv/search:
    get:
      tags:
        - TV
      summary: Search for TV shows
      description: Returns a list of TV shows matching the search query.
      parameters:
        - in: query
          name: q
          required: true
          schema:
            type: string
          description: Search term for TV shows.
        - in: query
          name: year
          required: false
          schema:
            type: string
          description: Filter results by first air date year.
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for paginated results.
      responses:
        '200':
          description: Successful TV search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSearchResult'
              examples:
                example:
                  value:
                    page: 1
                    totalPages: 25
                    totalResults: 496
                    results:
                      - id: 4607
                        title: 'Lost'
                        posterUrl: 'https://image.tmdb.org/t/p/w500/og65OaTZU6YUJAbqxeKjCa3kY1E.jpg'
                        firstAirDate: '2004-09-22'

  /tv/popular:
    get:
      tags:
        - TV
      summary: Get popular TV shows
      description: Returns a list of currently popular TV shows.
      parameters:
        - in: query
          name: page
          required: false
          schema:
            type: integer
            default: 1
          description: Page number for paginated results.
      responses:
        '200':
          description: Popular TV shows
          content:
            application/json:
              schema:
                type: object
                properties:
                  page:
                    type: integer
                  totalPages:
                    type: integer
                  totalResults:
                    type: integer
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/TvSearchResult'

  /tv/{id}:
    get:
      tags:
        - TV
      summary: Get TV show details
      description: Returns detailed information for a specific TV show.
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: TMDB TV show ID.
      responses:
        '200':
          description: TV show details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvDetails'
components:
  schemas:
    TvSearchResult:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        posterUrl:
          type: string
          nullable: true
        firstAirDate:
          type: string
          nullable: true

    TvDetails:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        posterUrl:
          type: string
          nullable: true
        synopsis:
          type: string
          nullable: true
        firstAirDate:
          type: string
          nullable: true
        genres:
          type: array
          items:
            type: string
        status:
          type: string
          nullable: true
        numberOfSeasons:
          type: integer
          nullable: true
        numberOfEpisodes:
          type: integer
          nullable: true
        networks:
          type: array
          items:
            type: string
