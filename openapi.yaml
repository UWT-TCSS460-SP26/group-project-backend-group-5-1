openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0
servers:
  - url: https://your-render-url.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development
tags:
  - name: General
    description: General-purpose routes
  - name: System
    description: Health and status routes
paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time
