openapi: 3.0.3
info:
  title: TCSS 460 Group 5 API
  description: |
    **Team:** Group 5
    **Deployed URL:** https://tcss460-group-5-api.onrender.com
    A RESTful API for the TCSS 460 group project.
  version: 0.1.0

servers:
  - url: https://tcss460-group-5-api.onrender.com
    description: Production
  - url: http://localhost:3000
    description: Local development

tags:
  - name: System
    description: Health and status routes
  - name: Movies
    description: Movie search, discovery, and details.
  - name: TV
    description: TV show search, discovery, and details.

paths:
  /health:
    get:
      tags: [System]
      summary: Health check
      description: Returns 200 OK when the API is alive. No auth required.
      responses:
        '200':
          description: API is running
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: 'ok'
                  uptime:
                    type: number
                    example: 3847.2
                  timestamp:
                    type: string
                    format: date-time

  /v1/movies:
    get:
      tags: [Movies]
      summary: Search or discover movies
      description: >
        Returns a list of movies. If a `query` parameter is provided, performs a
        text search via TMDB's search endpoint. Otherwise, uses TMDB's discover
        endpoint with the provided filter parameters.
      parameters:
        - name: query
          in: query
          description: Text search query (e.g. "spiderman"). When provided, all filter parameters are ignored.
          required: false
          schema:
            type: string
          example: spiderman
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: primary_release_date_gte
          in: query
          description: Filter movies released on or after this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2020-01-01'
        - name: primary_release_date_lte
          in: query
          description: Filter movies released on or before this date (YYYY-MM-DD). Only applies when `query` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2024-12-31'
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies when `query` is not provided.
          required: false
          schema:
            type: string
          example: '28,878'
        - name: with_runtime_gte
          in: query
          description: Filter by minimum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 90
        - name: with_runtime_lte
          in: query
          description: Filter by maximum runtime in minutes. Only applies when `query` is not provided.
          required: false
          schema:
            type: integer
          example: 180
      responses:
        '200':
          description: A list of movies matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/popular:
    get:
      tags: [Movies]
      summary: Get popular movies
      description: Returns a list of currently popular movies from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        '200':
          description: A list of popular movies.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/MovieSummary'
              example:
                - id: 557
                  title: Spider-Man
                  backdrop_path: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
                  poster_path: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/movies/{id}:
    get:
      tags: [Movies]
      summary: Get a movie by ID
      description: Returns detailed information for a specific movie by its TMDB movie ID.
      parameters:
        - name: id
          in: path
          description: The TMDB movie ID.
          required: true
          schema:
            type: integer
            minimum: 1
          example: 11
      responses:
        '200':
          description: Detailed information about the requested movie.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MovieDetail'
        '400':
          description: Invalid movie ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Movie id must be a positive integer
        '404':
          description: Movie not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: Movie with id 99999 not found
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/tv:
    get:
      tags: [TV]
      summary: Search or discover TV shows
      description: >
        Returns a list of TV shows. If a `q` parameter is provided, performs a
        text search via TMDB's search endpoint. Otherwise, uses TMDB's discover
        endpoint with the provided filter parameters.
      parameters:
        - name: q
          in: query
          description: Text search query (e.g. "breaking bad"). When provided, all filter parameters are ignored.
          required: false
          schema:
            type: string
          example: breaking bad
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
        - name: first_air_date_gte
          in: query
          description: Filter shows that first aired on or after this date (YYYY-MM-DD). Only applies when `q` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2020-01-01'
        - name: first_air_date_lte
          in: query
          description: Filter shows that first aired on or before this date (YYYY-MM-DD). Only applies when `q` is not provided.
          required: false
          schema:
            type: string
            format: date
          example: '2024-12-31'
        - name: with_genres
          in: query
          description: Comma-separated list of TMDB genre IDs to filter by. Only applies when `q` is not provided.
          required: false
          schema:
            type: string
          example: '18,10765'
        - name: with_runtime_gte
          in: query
          description: Filter by minimum episode runtime in minutes. Only applies when `q` is not provided.
          required: false
          schema:
            type: integer
          example: 20
        - name: with_runtime_lte
          in: query
          description: Filter by maximum episode runtime in minutes. Only applies when `q` is not provided.
          required: false
          schema:
            type: integer
          example: 60
      responses:
        '200':
          description: A list of TV shows matching the search or filter criteria.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TvSummary'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/tv/popular:
    get:
      tags: [TV]
      summary: Get popular TV shows
      description: Returns a list of currently popular TV shows from TMDB.
      parameters:
        - name: limit
          in: query
          description: Maximum number of results to return. Must be a positive integer no greater than 50.
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 50
          example: 20
        - name: language
          in: query
          description: Language of results in BCP 47 format.
          required: false
          schema:
            type: string
          example: en-US
      responses:
        '200':
          description: A list of popular TV shows.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/TvSummary'
        '400':
          description: Invalid query parameters.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              examples:
                invalidLimit:
                  summary: Invalid limit value
                  value:
                    error: limit must be a positive integer
                limitTooHigh:
                  summary: Limit exceeds maximum
                  value:
                    error: limit must not exceed 50
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /v1/tv/{id}:
    get:
      tags: [TV]
      summary: Get a TV show by ID
      description: Returns detailed information for a specific TV show by its TMDB ID.
      parameters:
        - name: id
          in: path
          description: The TMDB TV show ID.
          required: true
          schema:
            type: integer
            minimum: 1
          example: 1396
      responses:
        '200':
          description: Detailed information about the requested TV show.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TvDetail'
        '400':
          description: Invalid TV show ID.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: TV show id must be a positive integer
        '404':
          description: TV show not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
              example:
                error: TV show with id 99999 not found
        '500':
          description: Internal server error or TMDB API failure.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  schemas:
    MovieSummary:
      type: object
      description: A condensed movie object returned from list endpoints.
      properties:
        id:
          type: integer
          description: The TMDB movie ID.
          example: 557
        title:
          type: string
          description: The movie title.
          example: Spider-Man
        backdrop_path:
          type: string
          nullable: true
          description: Relative path to the backdrop image on TMDB's image CDN.
          example: /zQ8AxTPiCiS5nnwXpwTBPBHSaa5.jpg
        poster_path:
          type: string
          nullable: true
          description: Relative path to the poster image on TMDB's image CDN.
          example: /kjdJntyBeEvqm9w97QGBdxPptzj.jpg

    MovieDetail:
      type: object
      description: Detailed movie information returned from the single movie endpoint.
      properties:
        title:
          type: string
          example: Star Wars
        original_title:
          type: string
          example: Star Wars
        overview:
          type: string
          example: A long time ago in a galaxy far, far away...
        tagline:
          type: string
          example: A long time ago in a galaxy far, far away....
        runtime:
          type: integer
          example: 121
        release_date:
          type: string
          format: date
          example: '1977-05-25'
        status:
          type: string
          example: Released
        adult:
          type: boolean
          example: false
        genre_ids:
          type: array
          items:
            type: integer
          example: [12]
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example: [{ id: 12, name: Adventure }]
        original_language:
          type: string
          example: en
        spoken_languages:
          type: array
          items:
            type: object
            properties:
              english_name:
                type: string
              iso_639_1:
                type: string
              name:
                type: string
          example: [{ english_name: English, iso_639_1: en, name: English }]
        budget:
          type: integer
          example: 11000000
        revenue:
          type: integer
          example: 775398007
        poster_path:
          type: string
          nullable: true
          example: /6FfCtAuVAW8XJjZ7eWeLibRLWTw.jpg
        backdrop_path:
          type: string
          nullable: true
          example: /2w4xG178RpB4MDAIfTkqAuSJzec.jpg
        imdb_id:
          type: string
          example: tt0076759
        production_companies:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_countries:
          type: array
          items:
            type: object
            properties:
              iso_3166_1:
                type: string
              name:
                type: string
        belongs_to_collection:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            poster_path:
              type: string
              nullable: true
            backdrop_path:
              type: string
              nullable: true

    TvSummary:
      type: object
      description: A condensed TV show object returned from list endpoints.
      properties:
        id:
          type: integer
          description: The TMDB TV show ID.
          example: 1396
        name:
          type: string
          description: The TV show name.
          example: Breaking Bad
        backdrop_path:
          type: string
          nullable: true
          description: Relative path to the backdrop image on TMDB's image CDN.
          example: /tsRy63Mu5cu8etL1X7ZLyf7UP1M.jpg
        poster_path:
          type: string
          nullable: true
          description: Relative path to the poster image on TMDB's image CDN.
          example: /ggFHVNu6YYI5L9pCfOacjizRGt.jpg

    TvDetail:
      type: object
      description: Detailed TV show information returned from the single TV endpoint.
      properties:
        name:
          type: string
          example: Breaking Bad
        original_name:
          type: string
          example: Breaking Bad
        overview:
          type: string
          example: A chemistry teacher diagnosed with cancer turns to manufacturing drugs.
        tagline:
          type: string
          nullable: true
          example: Change the equation.
        first_air_date:
          type: string
          format: date
          example: '2008-01-20'
        last_air_date:
          type: string
          format: date
          nullable: true
          example: '2013-09-29'
        status:
          type: string
          example: Ended
        type:
          type: string
          example: Scripted
        adult:
          type: boolean
          example: false
        genres:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
          example: [{ id: 18, name: Drama }]
        original_language:
          type: string
          example: en
        spoken_languages:
          type: array
          items:
            type: object
            properties:
              english_name:
                type: string
              iso_639_1:
                type: string
              name:
                type: string
        origin_country:
          type: array
          items:
            type: string
          example: ['US']
        number_of_episodes:
          type: integer
          example: 62
        number_of_seasons:
          type: integer
          example: 5
        seasons:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              episode_count:
                type: integer
              air_date:
                type: string
                format: date
                nullable: true
        episode_run_time:
          type: array
          items:
            type: integer
          example: [45]
        last_episode_to_air:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            episode_number:
              type: integer
            season_number:
              type: integer
        next_episode_to_air:
          type: object
          nullable: true
          properties:
            id:
              type: integer
            name:
              type: string
            episode_number:
              type: integer
            season_number:
              type: integer
        networks:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_companies:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              logo_path:
                type: string
                nullable: true
              origin_country:
                type: string
        production_countries:
          type: array
          items:
            type: object
            properties:
              iso_3166_1:
                type: string
              name:
                type: string
        created_by:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              profile_path:
                type: string
                nullable: true

    Error:
      type: object
      properties:
        error:
          type: string
          description: A human-readable error message.
          example: Movie with id 99999 not found
